# Demo configuration used by .github/workflows/outpost.yml in this repo, to
# show `outpost` actually gating a build against a real domain.
#
# This is NOT meant to be used as-is in your own project -- copy
# `outpost.example.toml` instead, which is annotated field-by-field.
#
# Domain choice: cloudflare.com only. It's the domain hickory-resolver's own
# upstream test suite uses as its canonical "known to validate as DNSSEC
# Secure" target, and Cloudflare dogfoods modern TLS/HSTS on its own
# marketing domain -- see the README's "Testing" section for the full
# reasoning. github.com was tried here too and dropped: live testing showed
# it genuinely has no DNSSEC deployed, which would fail this gate on every
# single run, forever -- a correct finding about github.com, but a
# permanently red CI badge is a bad first impression for a demo whose whole
# point is showing the tool passing cleanly.

state_file = "outpost.state.json"

[defaults.ct]
allowed_issuers = [
  "Let's Encrypt",
  "Google Trust Services",
  "DigiCert Inc",
  "Sectigo Limited",
  "Cloudflare, Inc.",
  "Amazon",
]

[[domains]]
name = "cloudflare.com"
